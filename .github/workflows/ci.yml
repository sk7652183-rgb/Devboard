# Goals- I want to Lint,build and test my code for frontend and backend
# Then Push the images to dockerhub
name: CI

on:
  push:
    branches: [advanced]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v7
     - name: setup nodejs
       uses: actions/setup-node@v6
       with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
     - name: Install packages
       run: npm --prefix frontend/package.json install
     - name: Lint
       run: npm run lint
     - name: Test
       run: npm run test


